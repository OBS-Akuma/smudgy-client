name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    strategy:
      matrix:
        os: [macos-13, windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            arch: x64
          - os: macos-13
            arch: x64
          - os: ubuntu-latest
            arch: x64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Match Electron 10's internal version)
        uses: actions/setup-node@v4
        with:
          node-version: '12.22.12'  # Last Node 12 LTS

      - name: Install Dependencies
        run: npm install
        env:
          ELECTRON_MIRROR: "https://cdn.npmmirror.com/binaries/electron/"
          ELECTRON_CUSTOM_DIR: "v10.4.7"

      - name: Get version and name from package.json
        id: get_version_name
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT

      - name: Create Release
        if: matrix.os == 'ubuntu-latest'
        id: create_release
        uses: softprops/action-gh-release@v2.0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version_name.outputs.version }}
          name: Release ${{ steps.get_version_name.outputs.version }}
          draft: true
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron App
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
